<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<br>
<hr>
<button class="btn btn-primary">
  Boton 1
</button>
<br>
<hr>
<button class="btn btn-success">
  Correcto
</button>
<br>
<hr>
<button class="btn btn-danger">
  Salir
</button>
<br>
<hr>
<button class="btn btn-outline-primary">
  Contorno
</button>
<br>
<hr>
<div class="alert alert-success" role="alert">
  ¡CURSO INFORMATICA!
</div>
<br>
<hr>

<div id="carouselExampleDark" class="carousel carousel-dark slide" data-bs-ride="carousel">
  
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="0" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleDark" data-bs-slide-to="2" class="active" aria-current="true" aria-label="Slide 3"></button>
  </div>

  <div class="carousel-inner">
    <div class="carousel-item" data-bs-interval="10000">
      <div class="d-block w-100 bg-secondary d-flex justify-content-center align-items-center" style="height: 400px;">
        <h5>PRIMERA PARTE</h5>
      </div>
    </div>
    <div class="carousel-item" data-bs-interval="2000">
      <div class="d-block w-100 bg-secondary d-flex justify-content-center align-items-center" style="height: 400px;">
        <h5>SEGUNDA PARTE</h5>
      </div>
    </div>
    <div class="carousel-item active">
      <div class="d-block w-100 bg-secondary d-flex justify-content-center align-items-center" style="height: 400px; background-color: #db2020 !important;">
        <h2 class="text-muted">TERCERA PARTE</h2>
      </div>
    </div>
  </div>

  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">ANTES</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleDark" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">DESPUES</span>
  </button>
</div>
</html>
